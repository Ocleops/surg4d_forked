checkpoint_subdir: autoencoder
latent_patch_feat_subdir: qwen_patch_features_dim3
latent_instance_feat_subdir: qwen_instance_features_dim3
latent_cat_feat_subdir: qwen_cat_features_dim6

epochs: 100
lr: 1e-4
batch_size: 256
latent_dim: 3
full_dim: 3584
sigma_input: 0.0  # Gaussian noise std dev for input features (0 = disabled)
sigma_latent: 0.0  # Gaussian noise std dev for latent features (0 = disabled)

patch_feat_subdir: ${feature_extraction.patch_feat_subdir}
instance_feat_subdir: ${feature_extraction.instance_feat_subdir}

# Global autoencoder mode: train one AE across all clips instead of per-clip
global_mode: false
global_checkpoint_dir: global_autoencoder
