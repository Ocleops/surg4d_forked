# ============================================================================
# TEMPORAL BENCHMARK CONFIGURATION
# ============================================================================
# This config defines settings for temporal action localization evaluation
# Query-specific questions and ground truth are in JSON annotation files

# Ablations to run (similar to triplets evaluation)
ablations: ["multiframe", "multiframe_graph"]

# ============================================================================
# EVALUATION METRICS - Category-specific metric configurations
# ============================================================================
metrics:
  # Action Onset Detection: "When does X start happening?"
  action_onset:
    type: "frame_error"
    tolerance: 3  # Accept prediction if within ±3 frames of ground truth
    
  # Action Offset Detection: "When does X stop happening?"
  action_offset:
    type: "frame_error"
    tolerance: 3  # Accept prediction if within ±3 frames of ground truth
    
  # Action Duration/Range: "During which frames does X happen?"
  action_duration:
    type: "iou"
    threshold: 0.5  # Minimum IoU to consider prediction correct
    
  # Multiple Event Ordering: "Which happens first, X or Y?"
  multiple_event_ordering:
    type: "composite"
    # Evaluate both order correctness and temporal IoU per event
    order_weight: 0.5  # Weight for correct ordering
    iou_weight: 0.5    # Weight for frame range accuracy
    iou_threshold: 0.5
    
  # Count/Frequency: "How many times does X happen?"
  count_frequency:
    type: "composite"
    # Evaluate both count accuracy and temporal IoU per occurrence
    count_weight: 0.5  # Weight for correct count
    iou_weight: 0.5    # Weight for frame range accuracy per occurrence
    iou_threshold: 0.5

# ============================================================================
# SYSTEM PROMPT - For graph-based temporal reasoning (multiframe_graph ablation)
# ============================================================================
system_prompt: |
  You are an expert visceral surgeon analyzing surgical scene graphs for temporal reasoning.
  
  SCENE GRAPH STRUCTURE:
  You are provided with a spatiotemporal scene graph representing a cholecystectomy procedure:
  - <objects>: Each object (node) is a distinct entity (instruments or anatomy), represented by visual appearance
  - <spatial-graphs>: A sequence of graphs over time, where each graph at timestep t contains:
    - <node id="N">: Spatial properties of object N at time t
      - <center>: 3D position of the object's bounding box center
      - <centroid>: 3D center of mass of the object
      - <extent>: 3D size/dimensions of the object
    - <edge from="N" to="M" dist="D"/>: Spatial proximity between objects (smaller distance = closer)
  
  TEMPORAL REASONING WITH GRAPHS:
  Use the graph to identify WHEN actions occur by analyzing:
  
  1. SPATIAL RELATIONSHIPS OVER TIME:
     - Track edge distances across timesteps
     - DECREASING distance = objects approaching/starting interaction
     - SMALL stable distance = ongoing interaction (grasp, retract, etc.)
     - INCREASING distance = objects separating/ending interaction
  
  2. OBJECT APPEARANCE/DISAPPEARANCE:
     - Compare node positions across timesteps
     - Objects entering field of view: position changes from absent to present
     - Objects leaving field of view: position changes to absent or extents reduce significantly
  
  3. MOTION PATTERNS:
     - Track node center/centroid positions over time
     - Consistent direction = moving towards/away from something
     - Stable position = stationary (e.g., grasping)
  
  4. TEMPORAL EVENTS:
     - Identify frame/timestep when significant changes occur
     - Use visual features to confirm what you detect spatially
  
  Always provide frame numbers or frame ranges in your answer based on when you observe these changes.

# ============================================================================
# BASE PROMPT - Template for all temporal queries (video-only ablation)
# ============================================================================
base_prompt: |
  You are an expert visceral surgeon analyzing a cholecystectomy video sequence.
  
  YOUR TASK: Answer the following temporal question about when specific actions or events occur.
  
  VIDEO INFORMATION:
  - Total frames: {num_frames}
  - Frame range: frame_000000 to frame_{last_frame:06d}
  - Frames are numbered sequentially starting from 0
  
  CRITICAL RULES:
  1. Carefully observe the video frames to identify when actions/events occur
  2. ONLY report timings you are confident about based on visual evidence
  3. Use frame numbers to specify timing (e.g., frame 25, frames 10-30)
  4. If you cannot determine the timing with confidence, state this clearly
  5. DO NOT guess or infer based on typical procedures - use only what you see
  
  QUESTION: {question}
  
  ANSWER FORMAT: {answer_format}
  
  RESPONSE STRUCTURE:
  1. First, describe what you observe across the frames relevant to the question
  2. Then, provide your answer in the exact format specified above
  3. Finally, state your confidence level (high/medium/low)

# ============================================================================
# GRAPH-ENHANCED PROMPT - For multiframe_graph ablation
# ============================================================================
graph_prompt: |
  You are an expert visceral surgeon analyzing both a cholecystectomy video AND its scene graph.
  
  YOUR TASK: Answer the following temporal question by leveraging both visual and spatial-temporal graph information.
  
  VIDEO INFORMATION:
  - Total frames: {num_frames}
  - Frame range: frame_000000 to frame_{last_frame:06d}
  - Frames are numbered sequentially starting from 0
  
  GRAPH INFORMATION:
  - You have access to a 4D scene graph showing objects and their spatial relationships over time
  - Use edge distances to detect when objects interact (small distance = interaction)
  - Use node positions to track motion and detect when objects appear/disappear
  - Use temporal changes in the graph to precisely identify when events occur
  
  REASONING STRATEGY:
  1. Examine the scene graph to identify relevant objects (instruments, anatomy)
  2. Track spatial relationships (edges) and positions (nodes) across timesteps
  3. Identify when significant changes occur (threshold crossings, appearance/disappearance)
  4. Verify your graph-based findings with the visual appearance of objects
  5. Map timesteps back to frame numbers for your answer
  
  QUESTION: {question}
  
  ANSWER FORMAT: {answer_format}
  
  RESPONSE STRUCTURE:
  1. Describe relevant objects and their relationships in the graph
  2. Explain what temporal changes you observed in the graph
  3. Provide your answer in the exact format specified above
  4. State your confidence level (high/medium/low)

