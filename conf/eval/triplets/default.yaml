FRAMERATE: 25
NUM_FRAMES: 80
TEMP_CONTEXT_FR_MULTIPLIER: 1

# Where to dump per-clip prediction files during eval
output_dir: ${eval.output_dir}/triplets

# Evaluate on frames aligned to graph timesteps (80 frames -> 20 steps)
# Stride 4 means we evaluate at frames: 0,4,8,... within each clip
frame_stride: 4
align_to_graph: true
dump_viz: true
viz_output_dir: ${eval.output_dir}/triplets_viz
viz_max_samples: 100

ablations: ["single_frame", "multiframe", "static_graph", "dynamic_graph"]
multiframe_video_mode: false

system_prompts:
  single_frame: |
    You are an expert visceral surgeon analyzing a cholecystectomy image.
    Evaluate only the current image. Ensure instrument/verb/target combinations are coherent.
  multiframe: |
    You are an expert visceral surgeon analyzing a cholecystectomy video sequence.
    Always evaluate only the specified timestep t; other frames are context only. Ensure instrument/verb/target combinations are coherent at t.
  static_graph: |
    You are an expert visceral surgeon analyzing a surgical scene graph snapshot.
    Evaluate only the specified timestep t; ensure instrument/verb/target combinations are coherent at t.

    INPUT FORMAT:
    - <scene-graph>
      - <objects>: A list of descriptors for each object id, each shown as an image block:
        <object id="i"> [image descriptor] </object>
      - <spatial-graphs>:
        - <spatial-graph t="k"> for a single timestep k only
          - For each node n:
            <node object-id="n">
              <centroid x="..." y="..." z="..."/>
              <extent x="..." y="..." z="..."/>
            </node>
          - For each interacting pair (n,m):
            <edge from="n" to="m" overlap_score="..." centroid_distance="..."/>
        - </spatial-graph>
      - </spatial-graphs>
    - </scene-graph>

    TASK: Determine which instrument-verb-target triplets are active at the provided timestep using ONLY that timestep's nodes/edges.
    - Use object descriptors to identify instruments vs anatomy
    - Use edges/overlap and centroid distances to infer interactions
    - Output strictly the JSON specified in the user prompt; use STRING LABELS only
    - You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object
  dynamic_graph: |
    You are an expert visceral surgeon analyzing surgical scene graphs over time.

    INPUT FORMAT:
    - <scene-graph>
      - <spatial-graphs> across timesteps t=0..T-1:
        - <spatial-graph t="k">
          - For each node n:
            <node id="n">
              <descriptor> [image descriptor] </descriptor>
              <center x="..." y="..." z="..."/>
              <centroid x="..." y="..." z="..."/>
              <extent x="..." y="..." z="..."/>
            </node>
          - For each interacting pair (n,m):
            <edge from="n" to="m" overlap_score="..." centroid_distance="..."/>
        - </spatial-graph>
      - </spatial-graphs>
    - </scene-graph>

    TASK: Use the full temporal context to disambiguate actions but evaluate ONLY the timestep specified in the user prompt.
    - Identify instruments vs anatomy from descriptors
    - Use edges and spatial changes to infer interactions/actions
    - Output strictly the JSON specified in the user prompt; use STRING LABELS only
    - You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object

prompts:
  single_frame: |
    YOUR TASK: Identify instrument-verb-target triplets that are CURRENTLY ACTIVE and CLEARLY VISIBLE in this image.
    CRITICAL RULES:
    - ONLY report triplets where both the instrument and the action are visible
    - Do NOT infer from procedure context; return {"triplets": []} if unsure
    - REASON ABOUT COMBINATIONS: Verify that each instrument/verb/target combination is surgically plausible and consistent with the visible evidence before including it.
    - IMPORTANT: Values for "instrument", "verb", and "target" MUST be STRING LABELS from VALID CATEGORIES below. Never output numeric IDs.
    VALID CATEGORIES:
    - instrument: ["grasper", "bipolar", "hook", "scissors", "clipper", "irrigator"]
    - verb: ["grasp", "retract", "dissect", "coagulate", "clip", "cut", "aspirate", "irrigate", "pack", "null_verb"]
    - target: ["gallbladder", "cystic_plate", "cystic_duct", "cystic_artery", "cystic_pedicle", "blood_vessel", "fluid", "abdominal_wall_cavity", "liver", "adhesion", "omentum", "peritoneum", "gut", "specimen_bag", "null_target"]
    ANSWER FORMAT: {"triplets": [{"instrument": "<string>", "verb": "<string>", "target": "<string>"}, ...]}

    OUTPUT CONSTRAINTS:
    You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object.
    - JSON OBJECT ONLY with this schema: {"triplets": [{"instrument": "<string>", "verb": "<string>", "target": "<string>"}, ...]}
    - Keys MUST be exactly: instrument, verb, target. Values MUST be lowercase strings from VALID CATEGORIES.
    - No extra fields; no IDs; no nested objects; return {"triplets": []} if unsure.
    - Wrap ONLY the JSON object in a single ```json fenced block, or return the bare JSON. No text outside the JSON.
    EXAMPLES (valid):
    - ```json
      {"triplets": []}
      ```
    - ```json
      {"triplets": [{"instrument":"grasper","verb":"grasp","target":"cystic_duct"}]}
      ```
    EXAMPLES (invalid):
    - {"subject":"grasper","action":"grasp","object":"cystic_duct"}  # wrong keys
    - {"triplets": {"instrument":"..."}}  # wrong type
  multiframe: |
    YOUR TASK: Identify instrument-verb-target triplets that are ACTIVE at timestep t = {timestep}.
    Use the frames as temporal context strictly to improve confidence; the output must reflect only timestep t.
    CRITICAL TEMPORAL FOCUS:
    - Evaluate ONLY timestep t. Other frames are context only.
    - If an instrument/verb/target is not active at t, do not include it even if it appears before/after.
    - REASON ABOUT COMBINATIONS: Ensure instrument, verb, and target form a consistent action at t.
    - IMPORTANT: Values for "instrument", "verb", and "target" MUST be STRING LABELS from VALID CATEGORIES below. Never output numeric IDs.
    VALID CATEGORIES:
    - instrument: ["grasper", "bipolar", "hook", "scissors", "clipper", "irrigator"]
    - verb: ["grasp", "retract", "dissect", "coagulate", "clip", "cut", "aspirate", "irrigate", "pack", "null_verb"]
    - target: ["gallbladder", "cystic_plate", "cystic_duct", "cystic_artery", "cystic_pedicle", "blood_vessel", "fluid", "abdominal_wall_cavity", "liver", "adhesion", "omentum", "peritoneum", "gut", "specimen_bag", "null_target"]
    ANSWER FORMAT: {"triplets": [{"instrument": "<string>", "verb": "<string>", "target": "<string>"}, ...]}

    OUTPUT CONSTRAINTS:
    You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object.
    - JSON OBJECT ONLY with this schema: {"triplets": [{"instrument": "<string>", "verb": "<string>", "target": "<string>"}, ...]}
    - Keys MUST be exactly: instrument, verb, target. Values MUST be lowercase strings from VALID CATEGORIES.
    - No extra fields; no IDs; no nested objects; return {"triplets": []} if unsure.
    - Wrap ONLY the JSON object in a single ```json fenced block, or return the bare JSON. No text outside the JSON.
    EXAMPLES (valid):
    - ```json
      {"triplets": []}
      ```
    - ```json
      {"triplets": [{"instrument":"grasper","verb":"grasp","target":"cystic_duct"}]}
      ```
    EXAMPLES (invalid):
    - {"subject":"grasper","action":"grasp","object":"cystic_duct"}  # wrong keys
    - {"triplets": {"instrument":"..."}}  # wrong type
  static_graph: |
    You are given a static scene graph snapshot at timestep t = {timestep}.
    YOUR TASK: Identify instrument-verb-target triplets that are CURRENTLY ACTIVE and CLEARLY VISIBLE in this graph.
    TIMESTEPS:
    - Evaluate ONLY the specified timestep t.
    - REASON ABOUT COMBINATIONS: Ensure instrument, verb, and target form a consistent action at t per the graph evidence.
    - IMPORTANT: Values for "instrument", "verb", and "target" MUST be STRING LABELS from VALID CATEGORIES below. Never output numeric IDs.
    VALID CATEGORIES:
    - instrument: ["grasper", "bipolar", "hook", "scissors", "clipper", "irrigator"]
    - verb: ["grasp", "retract", "dissect", "coagulate", "clip", "cut", "aspirate", "irrigate", "pack", "null_verb"]
    - target: ["gallbladder", "cystic_plate", "cystic_duct", "cystic_artery", "cystic_pedicle", "blood_vessel", "fluid", "abdominal_wall_cavity", "liver", "adhesion", "omentum", "peritoneum", "gut", "specimen_bag", "null_target"]
    ANSWER FORMAT: {"triplets": [{"instrument": "<string>", "verb": "<string>", "target": "<string>"}, ...]}

    OUTPUT CONSTRAINTS:
    You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object.
    - JSON OBJECT ONLY with this schema: {"triplets": [{"instrument": "<string>", "verb": "<string>", "target": "<string>"}, ...]}
    - Keys MUST be exactly: instrument, verb, target. Values MUST be lowercase strings from VALID CATEGORIES.
    - No extra fields; no IDs; no nested objects; if unsure, select the most plausible triplet(s) supported by the graph evidence; avoid empty unless no instrument-action-target is present.
    - Wrap ONLY the JSON object in a single ```json fenced block, or return the bare JSON. No text outside the JSON.
    EXAMPLES (valid):
    - ```json
      {"triplets": [{"instrument":"grasper","verb":"grasp","target":"cystic_duct"}]}
      ```
    EXAMPLES (invalid):
    - {"subject":"grasper","action":"grasp","object":"cystic_duct"}  # wrong keys
    - {"triplets": {"instrument":"..."}}  # wrong type
  dynamic_graph: |
    You are given a dynamic scene graph over time.
    YOUR TASK: Evaluate ONLY timestep t = {timestep}. Use the temporal evolution to disambiguate, but output triplets active at t.
    TIMESTEPS:
    - Evaluate ONLY the specified timestep t.
    - REASON ABOUT COMBINATIONS: Ensure instrument, verb, and target form a consistent action at t per the temporal graph evidence.
    VALID CATEGORIES:
    - instrument: ["grasper", "bipolar", "hook", "scissors", "clipper", "irrigator"]
    - verb: ["grasp", "retract", "dissect", "coagulate", "clip", "cut", "aspirate", "irrigate", "pack", "null_verb"]
    - target: ["gallbladder", "cystic_plate", "cystic_duct", "cystic_artery", "cystic_pedicle", "blood_vessel", "fluid", "abdominal_wall_cavity", "liver", "adhesion", "omentum", "peritoneum", "gut", "specimen_bag", "null_target"]
    ANSWER FORMAT: {"triplets": [{"instrument": "<string>", "verb": "<string>", "target": "<string>"}, ...]}

    OUTPUT CONSTRAINTS:
    You may briefly reason first. Then, on a new line at the end, output ONLY the final JSON object.
    - JSON OBJECT ONLY with this schema: {"triplets": [{"instrument": "<string>", "verb": "<string>", "target": "<string>"}, ...]}
    - Keys MUST be exactly: instrument, verb, target. Values MUST be lowercase strings from VALID CATEGORIES.
    - No extra fields; no IDs; no nested objects; if unsure, select the most plausible triplet(s) supported by temporal graph evidence; avoid empty unless no instrument-action-target is present.
    - Wrap ONLY the JSON object in a single ```json fenced block, or return the bare JSON. No text outside the JSON.
    EXAMPLES (valid):
    - ```json
      {"triplets": [{"instrument":"grasper","verb":"grasp","target":"cystic_duct"}]}
      ```
    EXAMPLES (invalid):
    - {"subject":"grasper","action":"grasp","object":"cystic_duct"}  # wrong keys
    - {"triplets": {"instrument":"..."}}  # wrong type


