semantic_mask_subdir: semantic_masks
instance_mask_subdir: instance_masks
depth_subdir: depth

# TODO think if it makes sense to crop black borders with current methodology
# TODO we will use, the frames might end up tiny for some cholect50 clips!
frames_divisor: 28 # after removing black borders, center crop to multiple of this for qwen to work

vipe_vda: true # use video depth anything
vipe_save_viz: false

vipe_slam_map: false # use slam map as pointcloud instead of aggregated depth projections
pc_single_depth_projection: true # use single depth projection with highest range instead of aggregating
vipe_depth_step: 16 # stride for depth maps that end up in pointclouds, only used if pc_single_depth_projection is false and vipe_slam_map is false

verbose_output: false # keep intermediate output files (mostly vipe)