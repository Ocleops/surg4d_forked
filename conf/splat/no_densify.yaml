config_path: arguments/cholecseg8k/no_tv.py # this config disables total variation losses

depth_loss_weight: 1.0 
opacity_loss_weight: 0.0 # does not make sense without densification

dynamic_language: true
dynamic_scale: true
dynamic_color: true

# coarse iterations cut by 10x because we're only overfitting the feature heads on a single frame
coarse_base_iterations: 300
coarse_lang_iterations: 100
fine_base_iterations: 10000
fine_lang_iterations: 10000

# settings for simplifying coarse training for high quality initial depth map
densify_until_iter: 0 # don't densify at all
coarse_freeze_xyz: true # freeze gaussian means during coarse
coarse_frame_idx: ${preprocessing.da3_pc_frame_number} # overfit coarse on the frame we initialize from

# fine (dynamic) stage progressive frame sampling window
progressive_window:
  enabled: true
  warmup_iterations: 8000 # lineraly expand window around specified center during warmup
  center_frame_idx: ${splat.coarse_frame_idx}

# each stage starts at 0 iterations and the lang stages consider these lists
# ATTENTION: it's crucial to save the last iteration of fine lang here!
test_iterations: [100, 10000] # when to compute val metrics (logged to tensorboard)
save_iterations: [100, 10000] # when to save model checkpoints to disk (for rendering, graph extraction, etc.)
checkpoint_iterations: [] # when to save full checkpoints (with optimizer states for resuming)

render_outputs:
  coarse_base: false
  coarse_lang: false
  fine_base: false
  fine_lang: true

# environment variables
language_feature_hiddendim: 6
use_discrete_lang_f: f

latent_cat_feat_subdir: ${autoencoder.latent_cat_feat_subdir}